server:
  servlet:
    context-path: /example  # 业务项目按需修改

spring:
  config:
    import: classpath:application-lib.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${db_ip}:${db_port}/${db_database}?allowPublicKeyRetrieval=true&autoReconnect=true&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=CONVERT_TO_NULL&useSSL=false&nullCatalogMeansCurrent=true
    username: ${db_username}
    password: ${db_password}

sys:
  title: 示例系统
  captcha-enable: false

db_ip: 127.0.0.1
db_port: 3306
db_database: open-admin-example
db_username: root
db_password: 123456